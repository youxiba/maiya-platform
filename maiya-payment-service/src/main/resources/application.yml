server:
  port: 8085

spring:
  application:
    name: maiya-payment-service
  datasource:
    url: jdbc:mysql://hadoop003:3306/maiya_payment?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: maiya_payment
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      test-while-idle: true
      validation-query: SELECT 1
  cloud:
    nacos:
      discovery:
        server-addr: hadoop001:8848,hadoop002:8848,hadoop003:8848
        namespace: maiya
        group: MAIYA_GROUP
      config:
        server-addr: hadoop001:8848,hadoop002:8848,hadoop003:8848
        namespace: maiya
        group: MAIYA_GROUP
        file-extension: yml

mybatis-plus:
  type-aliases-package: ny.shop.youxuan.paymentservice.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# 支付宝配置（全部通过环境变量注入）
alipay:
  app-id: ${ALIPAY_APP_ID}
  private-key: ${ALIPAY_PRIVATE_KEY}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY}
  notify-url: ${ALIPAY_NOTIFY_URL}
  cert-path: ${ALIPAY_CERT_PATH}

# 微信支付配置
wxpay:
  app-id: ${WXPAY_APP_ID}
  mch-id: ${WXPAY_MCH_ID}
  mch-key: ${WXPAY_MCH_KEY}
  notify-url: ${WXPAY_NOTIFY_URL}
  cert-path: ${WXPAY_CERT_PATH}

# 微信小程序支付
wxxcx:
  app-id: ${WXXCX_APP_ID}
  app-secret: ${WXXCX_APPSECRET}

logging:
  level:
    ny.shop.youxuan.paymentservice: DEBUG
  file:
    path: /data/logs/${spring.application.name}
    name: ${logging.file.path}/payment-service.log

# ========== RocketMQ ==========
rocketmq:
  name-server: hadoop001:9876,hadoop002:9876
  producer:
    group: ${spring.application.name}-producer
    send-message-timeout: 3000
    retry-times-when-send-failed: 3
