# ============================================================
# flash-dynamic-limit.conf
# 基于共享内存的秒杀动态限流配置
#
# 部署：include 到 nginx.conf 的 http 块
# 依赖：flash_ratelimit.lua / global_limit.lua / auto_downgrade.lua
#       部署到 /etc/nginx/lua/ 目录
# ============================================================

# -------- Lua 库路径 --------
lua_package_path "/etc/nginx/lua/?.lua;;";

# -------- 共享内存定义 --------
# 限流计数器（跨 worker 共享）
lua_shared_dict flash_local_cnt   100m;
# 动态限流配置（由 API 更新）
lua_shared_dict flash_config      10m;
# 令牌桶状态
lua_shared_dict flash_token_bucket 50m;

# -------- 初始化 --------
init_worker_by_lua_block {
    local flash_ratelimit = require("flash_ratelimit")
    local auto_downgrade = require("auto_downgrade")
    local ngx_timer = ngx.timer

    -- 每 5 秒从 Redis 同步限流配置
    local function sync_config(premature)
        if premature then return end
        flash_ratelimit.sync_from_redis("hadoop003", 6379)
        ngx_timer.every(5, sync_config)
    end
    ngx_timer.every(5, sync_config)

    -- 启动自动降级（每 3 秒调整一次降级系数）
    auto_downgrade.start_auto_downgrade()
}
