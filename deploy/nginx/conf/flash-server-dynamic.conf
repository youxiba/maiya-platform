# ============================================================
# flash-server-dynamic.conf
# 秒杀动态限流 — Nginx server 段配置
#
# 部署：include 到 nginx.conf 的 server 块中
# 前置条件：flash-dynamic-limit.conf 已在 http 块中 include
# ============================================================

server {
    listen 443 ssl;
    server_name flash.maiya.youxuan.shop;

    ssl_certificate     /etc/nginx/certs/flash.pem;
    ssl_certificate_key /etc/nginx/certs/flash-key.pem;

    # -------- 秒杀抢购：动态限流 + 全局限流 --------
    location /api/flash/grab {
        access_by_lua_block {
            local flash_ratelimit = require("flash_ratelimit")
            local global_limit = require("global_limit")

            -- 获取客户端信息
            local ip  = ngx.var.remote_addr
            local uid = ngx.var.http_x_user_id
            local fsId = ngx.var.arg_fsId

            -- 1. 本地共享内存限流（三层漏斗）
            local allowed, reason = flash_ratelimit.check_all(ip, uid)
            if not allowed then
                ngx.status = 429
                ngx.header.content_type = "application/json"
                ngx.say('{"code":-6,"msg":"请求过于频繁","reason":"' .. reason .. '"}')
                ngx.exit(ngx.HTTP_OK)
                return
            end

            -- 2. Redis 全局限流（仅在本地通过后检查）
            if not global_limit.check_global_ip(ip) then
                ngx.status = 429
                ngx.header.content_type = "application/json"
                ngx.say('{"code":-6,"msg":"全局请求过于频繁","reason":"GLOBAL_IP_LIMIT"}')
                ngx.exit(ngx.HTTP_OK)
                return
            end

            if not global_limit.check_global_sku(fsId) then
                ngx.status = 429
                ngx.header.content_type = "application/json"
                ngx.say('{"code":-7,"msg":"当前商品太火爆","reason":"GLOBAL_SKU_LIMIT"}')
                ngx.exit(ngx.HTTP_OK)
                return
            end
        }

        proxy_pass http://flash_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-User-Id $http_x_user_id;
        proxy_set_header Host $host;

        proxy_connect_timeout 2s;
        proxy_send_timeout    3s;
        proxy_read_timeout    5s;

        client_max_body_size 1k;
        limit_except POST { deny all; }

        # 记录后端响应时间（用于自适应降级）
        body_filter_by_lua_block {
            local auto_downgrade = require("auto_downgrade")
            local request_time = ngx.var.request_time
            if request_time then
                auto_downgrade.record_upstream(request_time * 1000, ngx.status)
            end
        }

        access_log /var/log/nginx/flash-access.log flash_log buffer=32k flush=5s;
    }

    # -------- 活动信息（温和限流） --------
    location /api/flash/ {
        access_by_lua_block {
            local flash_ratelimit = require("flash_ratelimit")
            local ip = ngx.var.remote_addr
            local uid = ngx.var.http_x_user_id

            -- 查询类接口只做 IP 级限流
            if not flash_ratelimit.check_ip_limit(ip) then
                ngx.status = 429
                ngx.header.content_type = "application/json"
                ngx.say('{"code":-6,"msg":"请求过于频繁"}')
                ngx.exit(ngx.HTTP_OK)
                return
            end
        }

        proxy_pass http://flash_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        access_log /var/log/nginx/flash-access.log flash_log buffer=32k flush=5s;
    }

    # -------- 限流配置管理端点（仅限内网） --------
    location = /ratelimit/update {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;

        content_by_lua_block {
            local cjson = require("cjson")
            local flash_ratelimit = require("flash_ratelimit")

            ngx.req.read_body()
            local body = ngx.req.get_body_data()
            if not body then
                ngx.say('{"code":-1,"msg":"body required"}')
                return
            end

            local ok, data = pcall(cjson.decode, body)
            if not ok then
                ngx.say('{"code":-1,"msg":"invalid json"}')
                return
            end

            for key, value in pairs(data) do
                flash_ratelimit.update_config(key, value)
            end

            ngx.say('{"code":0,"msg":"ok","updated":' .. cjson.encode(data) .. '}')
        }
    }

    # -------- 限流状态查询 --------
    location = /ratelimit/status {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;

        content_by_lua_block {
            local cjson = require("cjson")
            local shared = ngx.shared

            local function get_config(key, default)
                local val = shared.flash_config:get("config:" .. key)
                return val or default
            end

            local status = {
                config = {
                    user_qps       = get_config("user_qps", "1000"),
                    ip_qps         = get_config("ip_qps", "3"),
                    total_qps      = get_config("total_qps", "5000"),
                    downgrade_rate = get_config("downgrade_rate", "1.0"),
                    enable_vip     = get_config("enable_vip", "1"),
                },
                memory = {
                    local_cnt_capacity = shared.flash_local_cnt:capacity(),
                    local_cnt_free     = shared.flash_local_cnt:free_space(),
                    config_capacity    = shared.flash_config:capacity(),
                    config_free        = shared.flash_config:free_space(),
                },
                timestamp = ngx.time(),
            }

            ngx.say(cjson.encode(status))
        }
    }
}
